<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universe City Ops</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#F7F5F0;--surface:#ffffff;--surface2:#F0EDE6;--border:#E2DDD4;--border2:#CCC5BA;
--text:#1A1A1A;--muted:#6B6560;--hint:#9B9590;
--primary:#6B1A2A;--primary-light:#8B2A3E;--primary-dark:#4A0F1C;
--gold:#C9A84C;--gold-light:#F5EDD6;--gold-dark:#7A5C00;
--purple:#4A2D7A;--purple-light:#EEE8F8;--purple-dark:#2E1A50;
--forest:#1E5C35;--forest-light:#E4F2EB;--forest-dark:#0F3320;
--good:#1E5C35;--good-bg:#E4F2EB;
--warn:#8A5C00;--warn-bg:#FFF3CD;
--danger:#A32D2D;--danger-bg:#FCEBEB;
--info:#4A2D7A;--info-bg:#EEE8F8;
}
body.dark{
--bg:#0D0D0D;--surface:#161616;--surface2:#1F1F1F;--border:#2A2A2A;--border2:#383838;
--text:#F0EDE6;--muted:#888580;--hint:#555250;
--primary:#8B2A3E;--primary-light:#A83A50;--primary-dark:#6B1A2A;
--gold-light:#2A2010;--gold-dark:#F0C84C;
--purple-light:#1A1230;--purple-dark:#C4A8F8;
--forest-light:#0A1F12;--forest-dark:#6FCF97;
--good:#6FCF97;--good-bg:#0A1F12;
--warn:#F5A623;--warn-bg:#2A1F00;
--danger:#E24B4A;--danger-bg:#2D0F0F;
--info:#C4A8F8;--info-bg:#1A1230;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;transition:background 0.2s,color 0.2s}

.topbar{background:#0D0D0D;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--primary-dark)}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{font-family:'Playfair Display',serif;font-size:17px;color:#fff;letter-spacing:0.02em}
.logo span{color:var(--gold)}
.site-badge{background:var(--primary);color:#fff;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:12px}
.sync{display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4CAF50;transition:background 0.3s}
.sync-dot.offline{background:#E24B4A}
.sync-dot.loading{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-label{color:rgba(255,255,255,0.4);font-size:11px}
.dark-toggle{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.55);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;transition:all 0.15s}
.dark-toggle:hover{background:rgba(255,255,255,0.15);color:#fff}

.tabs-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto;white-space:nowrap;position:sticky;top:49px;z-index:99}
.tab{display:inline-block;padding:12px 18px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;font-family:inherit}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
body.dark .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.active){color:var(--text)}

.content{padding:24px;max-width:880px;margin:0 auto}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;transition:background 0.2s,border 0.2s}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:14px}

.onboard{background:#0D0D0D;border-radius:12px;padding:20px 24px;margin-bottom:20px;border:1px solid var(--primary-dark)}
.onboard h2{font-family:'Playfair Display',serif;color:#fff;font-size:17px;margin-bottom:14px}
.onboard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.onboard-item{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:12px}
.onboard-item .oi-label{color:var(--gold);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px}
.onboard-item .oi-desc{color:rgba(255,255,255,0.55);font-size:12px;line-height:1.5}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;transition:background 0.2s}
.stat-n{font-size:24px;font-weight:600;display:block;color:var(--primary)}
body.dark .stat-n{color:var(--gold)}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px}

.form-grid{display:grid;gap:10px;margin-bottom:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
label{font-size:12px;font-weight:500;color:var(--muted);display:block;margin-bottom:3px}
input,select,textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:7px;font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;transition:border 0.15s,background 0.2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}
body.dark input:focus,body.dark select:focus,body.dark textarea:focus{border-color:var(--gold)}

.btn{padding:8px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;transition:all 0.15s}
.btn:hover{background:var(--surface2)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn.primary:hover{background:var(--primary-light)}
.btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn.sm{padding:4px 11px;font-size:12px}
.btn.danger{color:var(--danger);border-color:var(--danger-bg)}
.btn.danger:hover{background:var(--danger-bg)}

.item-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none;padding-bottom:0}
.item-row:first-child{padding-top:0}
.item-main{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;color:var(--text)}
.item-meta{margin-top:4px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500;white-space:nowrap}
.b-good{background:var(--good-bg);color:var(--good)}
.b-damaged{background:var(--warn-bg);color:var(--warn)}
.b-missing{background:var(--danger-bg);color:var(--danger)}
.b-replace{background:var(--danger-bg);color:var(--danger)}
.b-unknown{background:var(--surface2);color:var(--muted)}
.b-prog{background:var(--info-bg);color:var(--info)}
.b-storage{background:var(--gold-light);color:var(--gold-dark)}
.b-pending{background:var(--warn-bg);color:var(--warn)}
.b-received{background:var(--good-bg);color:var(--good)}

.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fbtn{padding:4px 12px;border-radius:100px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:inherit;transition:all 0.15s}
.fbtn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.fbtn:hover:not(.active){border-color:var(--border2);color:var(--text)}

.empty{text-align:center;padding:28px;color:var(--muted);font-size:13px}

.prog-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.prog-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;transition:background 0.2s}
.prog-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.prog-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.prog-title{font-size:13px;font-weight:600;flex:1}
.prog-item{font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.prog-item:last-child{border-bottom:none}
.prog-sub{font-size:11px;color:var(--muted);padding:2px 0 4px}

.week-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;transition:background 0.2s}
.week-head{background:#0D0D0D;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--primary-dark)}
.week-name{color:#fff;font-weight:600;font-size:14px}
.week-focus{color:var(--gold);font-size:12px;margin-top:1px}
.week-prog{color:rgba(255,255,255,0.45);font-size:12px}
.day-row{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--border);transition:background 0.1s;cursor:pointer}
.day-row:last-child{border-bottom:none}
.day-row:hover{background:var(--surface2)}
.day-label{font-size:12px;font-weight:600;color:var(--muted);width:86px;flex-shrink:0}
.day-task{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.day-row.done .day-task{text-decoration:line-through;color:var(--muted)}
input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--gold);flex-shrink:0}

.plan-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.progress-bar{height:5px;background:var(--surface2);border-radius:100px;overflow:hidden;margin-top:7px}
.progress-fill{height:100%;background:var(--gold);border-radius:100px;transition:width 0.4s}

.req-tabs{display:flex;gap:8px;margin-bottom:16px}
.rtab{padding:6px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:inherit;transition:all 0.15s}
.rtab.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.req-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.req-row:last-child{border-bottom:none;padding-bottom:0}
.req-row:first-child{padding-top:0}
.req-type{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:3px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0D0D0D;color:#fff;border:1px solid var(--primary);padding:9px 20px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">Universe City <span>Ops</span></div>
    <div class="site-badge">Virginia Court</div>
  </div>
  <div class="topbar-right">
    <div class="sync"><div class="sync-dot loading" id="sync-dot"></div><span class="sync-label" id="sync-label">Connecting</span></div>
    <button class="dark-toggle" onclick="toggleDark()" id="dark-btn">Dark mode</button>
  </div>
</div>

<div class="tabs-wrap">
  <button class="tab active" onclick="switchTab('plan')">Weekly Plan</button>
  <button class="tab" onclick="switchTab('locations')">Locations</button>
  <button class="tab" onclick="switchTab('storage')">Storage</button>
  <button class="tab" onclick="switchTab('inventory')">Inventory</button>
  <button class="tab" onclick="switchTab('programs')">By Program</button>
  <button class="tab" onclick="switchTab('requests')">Requests</button>
</div>

<div class="content">
  <div id="tab-plan"></div>
  <div id="tab-locations" style="display:none"></div>
  <div id="tab-storage" style="display:none"></div>
  <div id="tab-inventory" style="display:none"></div>
  <div id="tab-programs" style="display:none"></div>
  <div id="tab-requests" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://zbccaqcvwauujwpjiqid.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpiY2NhcWN2d2F1dWp3cGppcWlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzEzMDgsImV4cCI6MjA5MjgwNzMwOH0.VSSOjr3PUCmW5KlIVtgO-9w3HAwd9NudP-s240R2RWM';
const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);
const SITE='vc';

const PROGRAMS=['Arts & Culture','STEM','Gym','Education','Cafeteria','General'];
const CONDITIONS=['Good','Damaged','Missing Parts','Needs Replacing','Unknown'];
const PROG_COLORS={'Arts & Culture':'#6B1A2A','STEM':'#4A2D7A','Gym':'#1E5C35','Education':'#C9A84C','Cafeteria':'#2A5C7A','General':'#5A5550'};
const COND_CLASS={'Good':'b-good','Damaged':'b-damaged','Missing Parts':'b-missing','Needs Replacing':'b-replace','Unknown':'b-unknown'};

let locations=[], storage=[], inventory=[], requests=[];
let activeFilter='All', activeReqTab='request', activeTab='plan';

let weekPlan=[
  {week:'Phase 1',focus:'Clean and Organize',days:[
    {id:'w1d1',day:'Monday',task:'Clear all surfaces, remove clutter, and deep clean the main workspace',done:false},
    {id:'w1d2',day:'Tuesday',task:'Go through every cabinet and shelf, group similar items together',done:false},
    {id:'w1d3',day:'Wednesday',task:'Identify and label each storage spot so everything has a clear home',done:false},
    {id:'w1d4',day:'Thursday',task:'Clean out storage closets, separate what belongs from what does not',done:false},
    {id:'w1d5',day:'Friday',task:'Do a full walkthrough of every space, confirm everything is in its place',done:false}
  ]},
  {week:'Phase 2',focus:'Inventory and Tag',days:[
    {id:'w2d1',day:'Monday',task:'Log all items in the main workspace into Inventory, note condition and location',done:false},
    {id:'w2d2',day:'Tuesday',task:'Log all storage closet items, flag anything broken, missing, or low',done:false},
    {id:'w2d3',day:'Wednesday',task:'Tag every item to its program area with input from all program staff',done:false},
    {id:'w2d4',day:'Thursday',task:'Submit requests for anything that is missing, broken, or needed',done:false},
    {id:'w2d5',day:'Friday',task:'Review the full inventory with the team and confirm accuracy',done:false}
  ]},
  {week:'Phase 3',focus:'Connect and Build',days:[
    {id:'w3d1',day:'Monday',task:'Build a program guide for each active program area at this site',done:false},
    {id:'w3d2',day:'Tuesday',task:'Create a supply list per program tied directly to what is in inventory',done:false},
    {id:'w3d3',day:'Wednesday',task:'Build a simple presentation for each program so any staff can open and run it',done:false},
    {id:'w3d4',day:'Thursday',task:'Identify gaps between what each program needs and what the site has',done:false},
    {id:'w3d5',day:'Friday',task:'Share the program materials folder with the full team',done:false}
  ]},
  {week:'Phase 4',focus:'Maintain and Request',days:[
    {id:'w4d1',day:'Monday',task:'Do a quick scan of all spaces, reset anything that has shifted or been misplaced',done:false},
    {id:'w4d2',day:'Tuesday',task:'Check inventory for items that have been used up or are running low',done:false},
    {id:'w4d3',day:'Wednesday',task:'Log any new arrivals received this week under Requests and Receiving',done:false},
    {id:'w4d4',day:'Thursday',task:'Submit any new requests for supplies needed in the coming weeks',done:false},
    {id:'w4d5',day:'Friday',task:'Review open requests and follow up on anything still pending',done:false}
  ]}
];

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function setSync(state){
  const dot=document.getElementById('sync-dot');
  const label=document.getElementById('sync-label');
  dot.className='sync-dot'+(state==='live'?' ':state==='offline'?' offline':' loading');
  label.textContent=state==='live'?'Live':state==='offline'?'Offline':'Connecting';
}

function toggleDark(){
  document.body.classList.toggle('dark');
  const btn=document.getElementById('dark-btn');
  btn.textContent=document.body.classList.contains('dark')?'Light mode':'Dark mode';
  localStorage.setItem('vc_dark',document.body.classList.contains('dark')?'1':'0');
}

async function loadAll(){
  setSync('loading');
  try{
    const[l,s,i,r]=await Promise.all([
      db.from('locations').select('*').eq('site_id',SITE).order('created_at'),
      db.from('spaces').select('*').eq('site_id',SITE).order('created_at'),
      db.from('inventory').select('*').eq('site_id',SITE).order('created_at'),
      db.from('requests').select('*').eq('site_id',SITE).order('created_at',{ascending:false})
    ]);
    if(l.error||s.error||i.error||r.error)throw new Error();
    locations=l.data||[]; storage=s.data||[]; inventory=i.data||[]; requests=r.data||[];
    setSync('live');
  }catch(e){setSync('offline');}
  const saved=localStorage.getItem('vc_weekplan');
  if(saved)try{weekPlan=JSON.parse(saved);}catch(e){}
  if(localStorage.getItem('vc_dark')==='1')document.body.classList.add('dark');
  render();
}

function saveWeek(){localStorage.setItem('vc_weekplan',JSON.stringify(weekPlan));}

function switchTab(t){
  activeTab=t;
  ['plan','locations','storage','inventory','programs','requests'].forEach(n=>{
    document.getElementById('tab-'+n).style.display=t===n?'block':'none';
  });
  document.querySelectorAll('.tab').forEach((b,i)=>{
    b.classList.toggle('active',['plan','locations','storage','inventory','programs','requests'][i]===t);
  });
}

function render(){
  renderPlan(); renderLocations(); renderStorage();
  renderInventory(); renderPrograms(); renderRequests();
}

function renderPlan(){
  const el=document.getElementById('tab-plan');
  const allDays=weekPlan.flatMap(w=>w.days);
  const done=allDays.filter(d=>d.done).length;
  const total=allDays.length;
  const pct=Math.round(done/total*100);

  let h=`<div class="onboard">
<h2>How Universe City Ops works</h2>
<div class="onboard-grid">
<div class="onboard-item"><div class="oi-label">Locations</div><div class="oi-desc">The rooms and areas in the club. Office, Cafeteria, Gym.</div></div>
<div class="onboard-item"><div class="oi-label">Storage</div><div class="oi-desc">The specific spots inside each location. Cabinet, shelf, closet, cart.</div></div>
<div class="onboard-item"><div class="oi-label">Inventory</div><div class="oi-desc">Every item, its condition, where it lives, and what program it belongs to.</div></div>
</div>
</div>`;

  h+=`<div class="plan-stats">
<div class="stat"><span class="stat-n">${done}</span><span class="stat-l">Tasks complete</span></div>
<div class="stat"><span class="stat-n">${total-done}</span><span class="stat-l">Remaining</span></div>
<div class="stat"><span class="stat-n">${pct}%</span><span class="stat-l">Progress</span><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
</div>`;

  weekPlan.forEach((week,wi)=>{
    const wdone=week.days.filter(d=>d.done).length;
    h+=`<div class="week-card">
<div class="week-head">
<div><div class="week-name">${week.week}</div><div class="week-focus">${week.focus}</div></div>
<div class="week-prog">${wdone} of ${week.days.length}</div>
</div>`;
    week.days.forEach((day,di)=>{
      h+=`<div class="day-row${day.done?' done':''}" onclick="toggleDay(${wi},${di})">
<span class="day-label">${day.day}</span>
<input type="checkbox" ${day.done?'checked':''} onclick="event.stopPropagation();toggleDay(${wi},${di})">
<span class="day-task">${day.task}</span>
</div>`;
    });
    h+=`</div>`;
  });
  el.innerHTML=h;
}

function toggleDay(wi,di){
  weekPlan[wi].days[di].done=!weekPlan[wi].days[di].done;
  saveWeek(); renderPlan();
}

function renderLocations(){
  const el=document.getElementById('tab-locations');
  let h=`<div class="card">
<div class="card-title">Add a location</div>
<div class="form-grid g2">
<div><label>Location name</label><input id="loc-name" placeholder="e.g. Office, Cafeteria, Gym"></div>
<div><label>Notes (optional)</label><input id="loc-notes" placeholder="e.g. back of building, second floor"></div>
</div>
<button class="btn primary" onclick="addLocation()">Add location</button>
</div>`;

  if(locations.length===0){
    h+=`<div class="empty">No locations yet. Add the rooms and areas in your club.</div>`;
  }else{
    h+=`<div class="card"><div class="card-title">${locations.length} location${locations.length!==1?'s':''}</div>`;
    locations.forEach(loc=>{
      const count=storage.filter(s=>s.location_id===loc.id).length;
      h+=`<div class="item-row">
<div class="item-main">
<div class="item-name">${loc.name}</div>
<div class="item-meta">
${loc.notes?`<span style="font-size:12px;color:var(--muted)">${loc.notes}</span>`:''}
<span style="font-size:12px;color:var(--muted)">${count} storage spot${count!==1?'s':''}</span>
</div>
</div>
<button class="btn sm danger" onclick="deleteLocation('${loc.id}')">Remove</button>
</div>`;
    });
    h+=`</div>`;
  }
  el.innerHTML=h;
}

async function addLocation(){
  const name=document.getElementById('loc-name').value.trim();
  if(!name){toast('Please enter a location name');return;}
  const btn=event.target; btn.disabled=true; btn.textContent='Saving...';
  const{data,error}=await db.from('locations').insert({site_id:SITE,name,notes:document.getElementById('loc-notes').value.trim()}).select().single();
  btn.disabled=false; btn.textContent='Add location';
  if(error){toast('Error saving');return;}
  locations.push(data);
  document.getElementById('loc-name').value='';
  document.getElementById('loc-notes').value='';
  toast('Location added'); render();
}

async function deleteLocation(id){
  await db.from('spaces').update({location_id:null}).eq('location_id',id);
  await db.from('locations').delete().eq('id',id);
  locations=locations.filter(l=>l.id!==id);
  storage=storage.map(s=>s.location_id===id?{...s,location_id:null}:s);
  toast('Location removed'); render();
}

function renderStorage(){
  const el=document.getElementById('tab-storage');
  const locOpts=locations.map(l=>`<option value="${l.id}">${l.name}</option>`).join('');

  let h=`<div class="card">
<div class="card-title">Add a storage spot</div>
<div class="form-grid g2">
<div><label>Storage name</label><input id="st-name" placeholder="e.g. Cabinet Upper, Storage Closet, Ball Cart"></div>
<div><label>Location</label><select id="st-loc"><option value="">No location</option>${locOpts}</select></div>
</div>
<div class="form-grid g2">
<div><label>Type</label><select id="st-type"><option>Cabinet</option><option>Closet</option><option>Shelf</option><option>Cart</option><option>Fridge</option><option>Drawer</option><option>Room</option><option>Other</option></select></div>
<div><label>Notes (optional)</label><input id="st-notes" placeholder="e.g. top shelf only, left side"></div>
</div>
<button class="btn primary" onclick="addStorage()">Add storage spot</button>
</div>`;

  if(storage.length===0){
    h+=`<div class="empty">No storage spots yet. Add specific spots inside each location.</div>`;
  }else{
    const byLoc={};
    storage.forEach(s=>{
      const key=s.location_id||'none';
      if(!byLoc[key])byLoc[key]=[];
      byLoc[key].push(s);
    });
    Object.entries(byLoc).forEach(([locId,spots])=>{
      const loc=locations.find(l=>l.id===locId);
      h+=`<div class="card"><div class="card-title">${loc?loc.name:'No location assigned'}</div>`;
      spots.forEach(s=>{
        const count=inventory.filter(i=>i.space_id===s.id).length;
        h+=`<div class="item-row">
<div class="item-main">
<div class="item-name">${s.name}</div>
<div class="item-meta">
<span class="badge b-unknown">${s.type}</span>
${s.notes?`<span style="font-size:12px;color:var(--muted)">${s.notes}</span>`:''}
<span style="font-size:12px;color:var(--muted)">${count} item${count!==1?'s':''}</span>
</div>
</div>
<button class="btn sm danger" onclick="deleteStorage('${s.id}')">Remove</button>
</div>`;
      });
      h+=`</div>`;
    });
  }
  el.innerHTML=h;
}

async function addStorage(){
  const name=document.getElementById('st-name').value.trim();
  if(!name){toast('Please enter a storage name');return;}
  const btn=event.target; btn.disabled=true; btn.textContent='Saving...';
  const{data,error}=await db.from('spaces').insert({
    site_id:SITE, name,
    type:document.getElementById('st-type').value,
    location_id:document.getElementById('st-loc').value||null,
    notes:document.getElementById('st-notes').value.trim()
  }).select().single();
  btn.disabled=false; btn.textContent='Add storage spot';
  if(error){toast('Error saving');return;}
  storage.push(data);
  document.getElementById('st-name').value='';
  document.getElementById('st-notes').value='';
  toast('Storage spot added'); render();
}

async function deleteStorage(id){
  await db.from('inventory').update({space_id:null}).eq('space_id',id);
  await db.from('spaces').delete().eq('id',id);
  storage=storage.filter(s=>s.id!==id);
  inventory=inventory.map(i=>i.space_id===id?{...i,space_id:null}:i);
  toast('Storage spot removed'); render();
}

function renderInventory(){
  const el=document.getElementById('tab-inventory');
  const good=inventory.filter(i=>i.condition==='Good').length;
  const damaged=inventory.filter(i=>i.condition==='Damaged').length;
  const needs=inventory.filter(i=>['Needs Replacing','Missing Parts'].includes(i.condition)).length;

  const storageOpts=storage.map(s=>{
    const loc=locations.find(l=>l.id===s.location_id);
    return `<option value="${s.id}">${loc?loc.name+' — ':''} ${s.name}</option>`;
  }).join('');
  const progOpts=PROGRAMS.map(p=>`<option value="${p}">${p}</option>`).join('');

  let h=`<div class="stats">
<div class="stat"><span class="stat-n">${inventory.length}</span><span class="stat-l">Total items</span></div>
<div class="stat"><span class="stat-n" style="color:var(--good)">${good}</span><span class="stat-l">Good</span></div>
<div class="stat"><span class="stat-n" style="color:var(--warn)">${damaged}</span><span class="stat-l">Damaged</span></div>
<div class="stat"><span class="stat-n" style="color:var(--danger)">${needs}</span><span class="stat-l">Needs attention</span></div>
</div>`;

  h+=`<div class="card">
<div class="card-title">Add an item</div>
<div class="form-grid g2">
<div><label>Item name</label><input id="inv-name" placeholder="e.g. iPad, glue gun, soccer ball, markers"></div>
<div><label>Quantity</label><input id="inv-qty" type="number" min="0" value="1"></div>
</div>
<div class="form-grid g3">
<div><label>Condition</label><select id="inv-cond">${CONDITIONS.map(c=>`<option>${c}</option>`).join('')}</select></div>
<div><label>Storage spot</label><select id="inv-space"><option value="">Unknown</option>${storageOpts}</select></div>
<div><label>Program area</label><select id="inv-prog"><option value="">Select program</option>${progOpts}</select></div>
</div>
<div class="form-grid"><label>Notes</label><input id="inv-notes" placeholder="e.g. missing charger, used for market activity, needs to stay in art room"></div>
<button class="btn primary" onclick="addItem()">Add item</button>
</div>`;

  const allFilters=['All','Needs Attention',...locations.map(l=>l.name),...PROGRAMS];
  h+=`<div class="filters">`;
  allFilters.forEach(f=>{h+=`<button class="fbtn${activeFilter===f?' active':''}" onclick="setFilter('${f}')">${f}</button>`;});
  h+=`</div>`;

  let items=[...inventory];
  if(activeFilter==='Needs Attention')items=items.filter(i=>['Needs Replacing','Missing Parts','Damaged'].includes(i.condition));
  else if(locations.find(l=>l.name===activeFilter)){
    const locId=locations.find(l=>l.name===activeFilter).id;
    const storageIds=storage.filter(s=>s.location_id===locId).map(s=>s.id);
    items=items.filter(i=>storageIds.includes(i.space_id));
  }else if(PROGRAMS.includes(activeFilter))items=items.filter(i=>i.program===activeFilter);

  if(items.length===0){
    h+=`<div class="empty">${activeFilter!=='All'?'No items match this filter.':'No items yet. Add your first item above.'}</div>`;
  }else{
    h+=`<div class="card">`;
    items.forEach(item=>{
      const spot=storage.find(s=>s.id===item.space_id);
      const loc=spot?locations.find(l=>l.id===spot.location_id):null;
      const condClass=COND_CLASS[item.condition]||'b-unknown';
      h+=`<div class="item-row">
<div class="item-main">
<div class="item-name">${item.name} <span style="font-size:12px;font-weight:400;color:var(--muted)">x${item.qty}</span></div>
<div class="item-meta">
<span class="badge ${condClass}">${item.condition}</span>
${spot?`<span class="badge b-storage">${loc?loc.name+' / ':''} ${spot.name}</span>`:''}
${item.program?`<span class="badge b-prog">${item.program}</span>`:''}
${item.notes?`<span style="font-size:12px;color:var(--muted)">${item.notes}</span>`:''}
</div>
</div>
<button class="btn sm danger" onclick="deleteItem('${item.id}')">Remove</button>
</div>`;
    });
    h+=`</div>`;
  }
  el.innerHTML=h;
}

async function addItem(){
  const name=document.getElementById('inv-name').value.trim();
  if(!name){toast('Please enter an item name');return;}
  const btn=event.target; btn.disabled=true; btn.textContent='Saving...';
  const{data,error}=await db.from('inventory').insert({
    site_id:SITE, name,
    qty:parseInt(document.getElementById('inv-qty').value)||1,
    condition:document.getElementById('inv-cond').value,
    space_id:document.getElementById('inv-space').value||null,
    program:document.getElementById('inv-prog').value||null,
    notes:document.getElementById('inv-notes').value.trim()
  }).select().single();
  btn.disabled=false; btn.textContent='Add item';
  if(error){toast('Error saving');return;}
  inventory.push(data);
  document.getElementById('inv-name').value='';
  document.getElementById('inv-qty').value='1';
  document.getElementById('inv-notes').value='';
  toast('Item saved'); render();
}

async function deleteItem(id){
  await db.from('inventory').delete().eq('id',id);
  inventory=inventory.filter(i=>i.id!==id);
  toast('Item removed'); render();
}

function setFilter(f){activeFilter=f; renderInventory();}

function renderPrograms(){
  const el=document.getElementById('tab-programs');
  let h=`<div class="prog-grid">`;
  PROGRAMS.forEach(prog=>{
    const items=inventory.filter(i=>i.program===prog);
    const flagged=items.filter(i=>['Needs Replacing','Missing Parts','Damaged'].includes(i.condition));
    h+=`<div class="prog-card">
<div class="prog-head">
<span class="prog-dot" style="background:${PROG_COLORS[prog]}"></span>
<span class="prog-title">${prog}</span>
${flagged.length>0?`<span class="badge b-replace">${flagged.length} flagged</span>`:''}
</div>`;
    if(items.length===0){h+=`<div style="font-size:12px;color:var(--muted)">No items tagged yet</div>`;}
    else items.forEach(i=>{
      const spot=storage.find(s=>s.id===i.space_id);
      const loc=spot?locations.find(l=>l.id===spot.location_id):null;
      h+=`<div class="prog-item">
<span>${i.name} <span style="color:var(--muted)">x${i.qty}</span></span>
<span class="badge ${COND_CLASS[i.condition]||'b-unknown'}" style="font-size:10px">${i.condition}</span>
</div>`;
      if(spot)h+=`<div class="prog-sub">${loc?loc.name+' / ':''} ${spot.name}</div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

function renderRequests(){
  const el=document.getElementById('tab-requests');
  const locOpts=locations.map(l=>`<option value="${l.id}">${l.name}</option>`).join('');
  const progOpts=PROGRAMS.map(p=>`<option value="${p}">${p}</option>`).join('');
  const pending=requests.filter(r=>r.status==='pending').length;
  const received=requests.filter(r=>r.type==='receiving').length;

  let h=`<div class="stats" style="grid-template-columns:repeat(3,1fr)">
<div class="stat"><span class="stat-n">${requests.length}</span><span class="stat-l">Total entries</span></div>
<div class="stat"><span class="stat-n" style="color:var(--warn)">${pending}</span><span class="stat-l">Pending requests</span></div>
<div class="stat"><span class="stat-n" style="color:var(--good)">${received}</span><span class="stat-l">Items received</span></div>
</div>`;

  h+=`<div class="req-tabs">
<button class="rtab${activeReqTab==='request'?' active':''}" onclick="switchReqTab('request')">We need this</button>
<button class="rtab${activeReqTab==='receiving'?' active':''}" onclick="switchReqTab('receiving')">We just got this</button>
</div>`;

  if(activeReqTab==='request'){
    h+=`<div class="card">
<div class="card-title">Submit a request</div>
<div class="form-grid g2">
<div><label>What do we need?</label><input id="req-name" placeholder="e.g. construction paper, replacement iPad, soccer cones"></div>
<div><label>Quantity</label><input id="req-qty" type="number" min="1" value="1"></div>
</div>
<div class="form-grid g2">
<div><label>Program it is for</label><select id="req-prog"><option value="">Select program</option>${progOpts}</select></div>
<div><label>Where would it live?</label><select id="req-loc"><option value="">Select location</option>${locOpts}</select></div>
</div>
<div class="form-grid"><label>Why do we need it?</label><input id="req-reason" placeholder="e.g. we ran out during week 2, needed for the album project, broken and can't be fixed"></div>
<button class="btn primary" onclick="submitRequest('request')">Submit request</button>
</div>`;
  }else{
    h+=`<div class="card">
<div class="card-title">Log new arrival</div>
<div class="form-grid g2">
<div><label>What arrived?</label><input id="rec-name" placeholder="e.g. 10 new markers, replacement projector cable"></div>
<div><label>Quantity</label><input id="rec-qty" type="number" min="1" value="1"></div>
</div>
<div class="form-grid g2">
<div><label>Program it belongs to</label><select id="rec-prog"><option value="">Select program</option>${progOpts}</select></div>
<div><label>Where will it live?</label><select id="rec-loc"><option value="">Select location</option>${locOpts}</select></div>
</div>
<div class="form-grid"><label>Notes</label><input id="rec-reason" placeholder="e.g. ordered last week, donated by parent, picked up from district"></div>
<button class="btn gold" onclick="submitRequest('receiving')">Log arrival</button>
</div>`;
  }

  const filtered=requests.filter(r=>r.type===(activeReqTab==='request'?'request':'receiving'));
  if(filtered.length>0){
    h+=`<div class="card"><div class="card-title">${activeReqTab==='request'?'Pending requests':'Received items'}</div>`;
    filtered.forEach(r=>{
      const loc=locations.find(l=>l.id===r.location_id);
      h+=`<div class="req-row">
<div class="item-main">
<div class="req-type">${r.type==='request'?'Request':'Received'}</div>
<div class="item-name">${r.item_name} <span style="font-size:12px;font-weight:400;color:var(--muted)">x${r.qty}</span></div>
<div class="item-meta">
${r.program?`<span class="badge b-prog">${r.program}</span>`:''}
${loc?`<span class="badge b-storage">${loc.name}</span>`:''}
<span class="badge ${r.status==='pending'?'b-pending':'b-received'}">${r.status}</span>
${r.reason?`<span style="font-size:12px;color:var(--muted)">${r.reason}</span>`:''}
</div>
</div>
${r.status==='pending'?`<button class="btn sm" onclick="markReceived('${r.id}')">Mark received</button>`:''}
</div>`;
    });
    h+=`</div>`;
  }
  el.innerHTML=h;
}

async function submitRequest(type){
  const nameId=type==='request'?'req-name':'rec-name';
  const name=document.getElementById(nameId).value.trim();
  if(!name){toast('Please enter an item name');return;}
  const btn=event.target; btn.disabled=true; btn.textContent='Saving...';
  const{data,error}=await db.from('requests').insert({
    site_id:SITE, type,
    item_name:name,
    qty:parseInt(document.getElementById(type==='request'?'req-qty':'rec-qty').value)||1,
    program:document.getElementById(type==='request'?'req-prog':'rec-prog').value||null,
    location_id:document.getElementById(type==='request'?'req-loc':'rec-loc').value||null,
    reason:document.getElementById(type==='request'?'req-reason':'rec-reason').value.trim(),
    status:type==='request'?'pending':'received'
  }).select().single();
  btn.disabled=false; btn.textContent=type==='request'?'Submit request':'Log arrival';
  if(error){toast('Error saving');return;}
  requests.unshift(data);
  toast(type==='request'?'Request submitted':'Arrival logged');
  render();
}

async function markReceived(id){
  await db.from('requests').update({status:'received'}).eq('id',id);
  requests=requests.map(r=>r.id===id?{...r,status:'received'}:r);
  toast('Marked as received'); renderRequests();
}

function switchReqTab(t){activeReqTab=t; renderRequests();}

loadAll();
</script>
</body>
</html>
